<mat-nav-list class="tools">
  <a *ngFor="let item of navItems" mat-list-item [routerLink]="item.route" routerLinkActive #rla="routerLinkActive"
    [activated]="rla.isActive">
    <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
    <span *ngIf="showLabel$ | async">{{ item.title }}</span>
  </a>
</mat-nav-list>
